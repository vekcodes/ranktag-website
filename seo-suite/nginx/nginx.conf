user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rid=$http_x_request_id rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Core tuning ──
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;
    types_hash_max_size 2048;
    client_max_body_size 25m;
    client_body_buffer_size 128k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    send_timeout 60s;
    reset_timedout_connection on;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/wasm
        image/svg+xml
        text/plain
        text/css
        text/javascript
        text/xml;

    # ── Brotli (enable if module present) ──
    # brotli on; brotli_comp_level 5; brotli_types ...;

    # ── Rate limit zones ──
    limit_req_zone $binary_remote_addr zone=api_rl:20m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=anon_rl:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstreams ──
    upstream backend_api {
        server api:8000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }
    upstream frontend_next {
        server frontend:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ── Real-IP from upstream proxy ──
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/conf.d/*.conf;
}
