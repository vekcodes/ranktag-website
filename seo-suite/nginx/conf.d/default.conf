# ── Common security/proxy headers ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Generic security headers (FastAPI adds more on JSON responses).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Healthcheck (no rate limit) ──
    location = /healthz {
        proxy_pass http://backend_api/healthz;
        access_log off;
    }

    # ── API ──
    location /api/ {
        limit_req zone=api_rl burst=40 nodelay;
        limit_conn conn_per_ip 50;

        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-ID      $request_id;
        proxy_set_header Connection        "";
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        # JSON responses are dynamic — never cache.
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ── WebSocket / SSE (job progress) ──
    location /api/v1/sse/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Next.js static / image assets — cache aggressively ──
    location /_next/static/ {
        proxy_pass http://frontend_next;
        proxy_cache_valid 200 365d;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image/ {
        proxy_pass http://frontend_next;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Public static files (favicon, robots) ──
    location ~* \.(?:ico|svg|png|jpg|jpeg|webp|woff2?|css|js)$ {
        proxy_pass http://frontend_next;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # ── Everything else → Next.js SSR ──
    location / {
        limit_req zone=anon_rl burst=20 nodelay;

        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}
