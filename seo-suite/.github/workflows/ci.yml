name: CI

on:
  push:
    branches: [main]
    paths: ["seo-suite/**"]
  pull_request:
    paths: ["seo-suite/**"]

defaults:
  run:
    working-directory: seo-suite

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: seosuite
          POSTGRES_PASSWORD: seosuite_dev_pw
          POSTGRES_DB: seosuite
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U seosuite"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - name: Install
        working-directory: seo-suite/backend
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        working-directory: seo-suite/backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check
        working-directory: seo-suite/backend
        run: mypy app || true   # not strict yet

      - name: Test
        working-directory: seo-suite/backend
        env:
          DATABASE_URL: postgresql+asyncpg://seosuite:seosuite_dev_pw@localhost:5432/seosuite
          DATABASE_URL_SYNC: postgresql+psycopg2://seosuite:seosuite_dev_pw@localhost:5432/seosuite
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/4
        run: pytest tests -v

  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: seo-suite/frontend/package-lock.json }

      - name: Install
        working-directory: seo-suite/frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: seo-suite/frontend
        run: npm run lint

      - name: Type-check
        working-directory: seo-suite/frontend
        run: npm run type-check

      - name: Build
        working-directory: seo-suite/frontend
        run: npm run build

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: seo-suite/backend
          push: false
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: seo-suite/frontend
          push: false
