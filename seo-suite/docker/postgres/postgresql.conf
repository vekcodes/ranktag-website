# ───────────────────────────────────────────────────────────────────────
#  PostgreSQL 16 — SEO Suite production-leaning config
#
#  Mounted at /etc/postgresql/postgresql.conf and selected at boot via
#  `postgres -c config_file=...` in docker-compose. Values are sized for
#  a 4-vCPU / 8 GB container; adjust for actual node sizing.
#
#  Production (RDS / Aurora / managed) — these knobs are set on the
#  parameter group, not in this file. This file is the dev mirror.
# ───────────────────────────────────────────────────────────────────────

# ── Connections ────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 300                          # PgBouncer absorbs the storm
superuser_reserved_connections = 5

# ── Memory (sized for ~8 GB container; halve for laptops) ──────────────
shared_buffers = 2GB                           # 25% of RAM
effective_cache_size = 5GB                     # ~60% of RAM
work_mem = 32MB                                # per query operation; mult. by sort/hash nodes
maintenance_work_mem = 512MB
temp_buffers = 32MB
huge_pages = try

# ── WAL / replication ──────────────────────────────────────────────────
wal_level = replica                             # 'logical' if/when CDC needed
max_wal_size = 4GB
min_wal_size = 1GB
wal_buffers = 16MB
wal_compression = on
max_wal_senders = 10
wal_keep_size = 2GB                             # keep enough for a standby to catch up
hot_standby = on
hot_standby_feedback = on
synchronous_commit = on                         # on for safety; off for ingest-heavy replicas

# ── Checkpoints ────────────────────────────────────────────────────────
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
checkpoint_warning = 30s

# ── Background writer / I/O ────────────────────────────────────────────
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
effective_io_concurrency = 200                  # raise on NVMe; default 1 is for HDD
random_page_cost = 1.1                          # SSD-friendly
seq_page_cost = 1.0

# ── Parallelism ────────────────────────────────────────────────────────
max_worker_processes = 16
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ── Autovacuum (more aggressive than default for write-heavy tables) ───
autovacuum = on
autovacuum_max_workers = 5
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 4000
autovacuum_work_mem = 1GB

# ── Statistics ─────────────────────────────────────────────────────────
default_statistics_target = 200                 # better plans for skewed columns
track_io_timing = on
track_functions = pl
track_activity_query_size = 4096
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements
pg_stat_statements.max = 10000
pg_stat_statements.track = top
pg_stat_statements.track_utility = on
pg_stat_statements.save = on

# auto_explain — log plans of slow queries
auto_explain.log_min_duration = '500ms'
auto_explain.log_analyze = off                  # ANALYZE in prod is expensive; leave off
auto_explain.log_buffers = on
auto_explain.log_format = json
auto_explain.log_nested_statements = on
auto_explain.sample_rate = 1.0

# ── Logging ────────────────────────────────────────────────────────────
log_destination = 'stderr'                      # docker / k8s collects
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 500ms              # slow query log
log_checkpoints = on
log_connections = off                           # noisy; PgBouncer is the real layer
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB                           # alert on big sorts spilling to disk
log_autovacuum_min_duration = 0
log_error_verbosity = default
log_statement = 'ddl'                           # log schema changes; never `all`
log_line_prefix = '%m [%p] %q%u@%d/%a '         # ts, pid, user@db/app

# ── Locks / deadlocks ──────────────────────────────────────────────────
deadlock_timeout = 1s
lock_timeout = 10s                              # don't block forever on a row lock
idle_in_transaction_session_timeout = 60s

# ── Statement timeouts (global default; per-role overrides in init.sql) ─
statement_timeout = 30s
client_encoding = 'UTF8'

# ── Security ───────────────────────────────────────────────────────────
ssl = off                                       # on in prod; managed by RDS / Patroni
password_encryption = scram-sha-256
row_security = on                               # RLS available where models opt in

# ── JIT (helps analytical queries) ─────────────────────────────────────
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# ── Time zone ──────────────────────────────────────────────────────────
timezone = 'UTC'
log_timezone = 'UTC'

# ── Locale ─────────────────────────────────────────────────────────────
datestyle = 'iso, mdy'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'
default_text_search_config = 'pg_catalog.english'
