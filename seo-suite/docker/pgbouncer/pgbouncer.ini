; ─────────────────────────────────────────────────────────────────────
;  PgBouncer — transaction-mode pooler in front of Postgres.
;
;  Why we run it:
;    - Hundreds of app pods × many workers each = thousands of would-be
;      direct PG connections. PgBouncer multiplexes them onto ~200
;      backend connections so PG's per-connection memory cost is bounded.
;    - Connection storm absorption during HPA scale-up.
;    - Centralized place to enforce timeouts, max_client_conn caps.
;
;  Mode: transaction.  Means a backend connection is bound to a client
;  only for the duration of a transaction. Compatible with SQLAlchemy +
;  asyncpg as long as we don't rely on session-scoped state (LISTEN/
;  NOTIFY, SET LOCAL outside a txn, advisory locks across statements).
; ─────────────────────────────────────────────────────────────────────

[databases]
; Primary OLTP traffic for the app.
seosuite        = host=postgres port=5432 dbname=seosuite auth_user=seosuite_app

; Read-only pool — point this at a replica in prod.
seosuite_ro     = host=postgres port=5432 dbname=seosuite auth_user=seosuite_ro

; Migrations — small pool, longer timeouts.
seosuite_admin  = host=postgres port=5432 dbname=seosuite auth_user=seosuite_migrator

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir =

; Auth — userlist.txt maps users to scram hashes; mounted read-only.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = seosuite_migrator

; Pool sizing
pool_mode = transaction
max_client_conn = 4000
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3
min_pool_size = 5
max_db_connections = 200
max_user_connections = 200

; Timeouts
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 5
query_timeout = 0                  ; 0 = use PG's statement_timeout instead
query_wait_timeout = 60
client_login_timeout = 10
client_idle_timeout = 0
idle_transaction_timeout = 0       ; PG enforces this via idle_in_transaction_session_timeout
suspend_timeout = 30

; TLS — terminate TLS to clients; connect to PG in cleartext on private net
; client_tls_sslmode = require
; client_tls_key_file = /etc/pgbouncer/tls.key
; client_tls_cert_file = /etc/pgbouncer/tls.crt
; server_tls_sslmode = prefer

; Admin / control
admin_users = seosuite_migrator
stats_users = seosuite_migrator, seosuite_ro

; Behaviour
ignore_startup_parameters = extra_float_digits,search_path,application_name
server_reset_query = DISCARD ALL
server_check_query = select 1
server_check_delay = 30
disable_pqexec = 0

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
verbose = 0
syslog = 0

; Limits / safety
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 3
