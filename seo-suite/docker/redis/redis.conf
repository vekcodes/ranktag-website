# SEO Suite Redis config — dev-leaning, prod-safe defaults.

bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Persistence: append-only file every second (durable enough for cache + broker).
appendonly yes
appendfsync everysec

# Eviction: only keys with TTL get evicted; protects broker keys.
maxmemory-policy volatile-lru

# Logging
loglevel notice

# Performance
io-threads 4
io-threads-do-reads yes
