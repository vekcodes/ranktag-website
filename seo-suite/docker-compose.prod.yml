# ─────────────────────────────────────────────────────────────
#  SEO Suite — Production overrides
#  Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Differences from base:
#    - No bind-mounts of source (immutable image)
#    - Restart policy: always
#    - Worker fleet split per queue role (render isolated, low concurrency)
#    - Resource reservations + limits
#    - HTTPS expected to terminate at upstream LB; nginx talks HTTP internally
# ─────────────────────────────────────────────────────────────
name: seo-suite

services:
  api:
    restart: always
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "2.0", memory: 1024M }
        reservations: { cpus: "0.5", memory: 256M }

  worker:
    restart: always
    volumes: []
    environment:
      CELERY_QUEUES: "q.crawl.high,q.crawl.low,q.parse,q.aggregate,q.metrics,q.whois,q.alerts,q.exports"
      CELERY_CONCURRENCY: "8"
    deploy:
      replicas: 4
      resources:
        limits: { cpus: "2.0", memory: 1536M }

  worker-renderer:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file: ./backend/.env
    environment:
      CELERY_QUEUES: "q.render"
      CELERY_CONCURRENCY: "2"
    depends_on:
      - redis
      - postgres
    networks: [internal]
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "2.0", memory: 2048M }

  beat:
    restart: always
    volumes: []
    deploy:
      replicas: 1

  frontend:
    restart: always
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "1.0", memory: 512M }

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
