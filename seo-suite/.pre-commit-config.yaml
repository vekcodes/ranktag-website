# Pre-commit hooks for the SEO Suite repo.
#
# Install once:
#   pip install pre-commit && pre-commit install
#
# Run manually against all files:
#   pre-commit run --all-files
#
# Hooks run on the staged subset on commit. CI runs the same hooks via
# `pre-commit run --all-files` in .github/workflows/ci.yml.

default_language_version:
  python: python3.12

repos:
  # ── Sanity ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$|alembic/versions/.*
      - id: end-of-file-fixer
        exclude: alembic/versions/.*
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Python lint + format (Ruff replaces Black + isort + flake8) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Type-check (mypy) — staged-files only on commit; full run in CI ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - types-redis
          - types-requests
        args: ["--config-file=backend/pyproject.toml"]

  # ── Secrets scanning ──
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json|\.env\.example

  # ── Dockerfile lint ──
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3013"]
        files: Dockerfile.*

  # ── Shell scripts ──
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: ^backend/scripts/.*\.sh$
